services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nanite_postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: nanite
      POSTGRES_PASSWORD: nanite
      POSTGRES_DB: nanite
    ports:
      - "5432:5432"
    volumes:
      - nanite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanite"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nanite_redis
    ports:
      - "6379:6379"
    volumes:
      - nanite_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: nanite_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - nanite_pgadmin_data:/var/lib/pgadmin

  redisinsight:
    image: redis/redisinsight:latest
    container_name: nanite_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - nanite_redisinsight_data:/data

  backend:
    build: ./backend
    container_name: nanite_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  worker:
    build: ./backend
    container_name: nanite_worker
    command: uv run arq app.workers.settings.WorkerSettings
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

volumes:
  nanite_postgres_data:
  nanite_redis_data:
  nanite_pgadmin_data:
  nanite_redisinsight_data:
